version: '3.8'

name: notification-system

services:
  # Migration Runner
  migration-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    command: >
      sh -c "
        echo 'Waiting for DB to be ready...' &&
        cd /home/app/migration &&
        /opt/venv/bin/alembic upgrade head &&
        echo 'Migrations applied.'
      "
    depends_on:
      db:
        condition: service_healthy
    networks:
      - notification_network
    env_file:
      - ../.env
    environment:
      DATABASE_URL: "postgresql://myuser:mypassword@db:5432/notification_system"
  # API Service
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: notification_api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: "postgresql://myuser:mypassword@db:5432/notification_system"
    ports:
      - "8000:8000"
    depends_on:
      migration-runner:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    networks:
      - notification_network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: notification_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-notification_system}
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mypassword}
      POSTGRES_HOST_AUTH_METHOD: trust
    env_file:
      - ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    networks:
      - notification_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myuser} -d ${POSTGRES_DB:-notification_system}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Service
  rabbitmq:
    image: rabbitmq:3-management
    container_name: notification_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - notification_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Notification Worker (Direct MQ Consumer)
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: notification_worker
    command: python -m app.worker.consumer
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      - app
      - rabbitmq
      - db
    networks:
      - notification_network

networks:
  notification_network:
    driver: bridge
volumes:
  postgres_data:
